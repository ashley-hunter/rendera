name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel in-progress runs for the same ref (e.g. new pushes to a PR)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so Nx can determine affected projects if needed
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Angular component tests run in Vitest browser mode (Chromium via
      # Playwright), so install the browser and its OS dependencies.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint, test and build all libraries
        run: pnpm nx run-many -t lint test build --parallel=3
